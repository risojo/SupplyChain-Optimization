# LRI — Blueprint Render (repo raíz: varios módulos BI / supply chain)
# Perfilado Pro (Profile Pro) = modules/perfilado/profile1.py
#   Servicio Render: lri-analytics-pro  →  https://lri-analytics-pro.onrender.com
# Inventarios = modules/inventarios/inventario_app.py
#   Servicio Render: lri-inventarios
#
# Nota: «Supply Chain Optimization» es el nombre del repositorio GitHub (monorepo).
# El servicio mantiene el slug lri-analytics-pro para conservar la URL pública.
#
# Crear/sincronizar: https://dashboard.render.com/blueprint/new?repo=https://github.com/risojo/SupplyChain-Optimization
services:
  - type: web
    name: lri-analytics-pro
    runtime: python
    plan: free
    region: oregon
    repo: https://github.com/risojo/SupplyChain-Optimization
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run modules/perfilado/profile1.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
  - type: web
    name: lri-inventarios
    runtime: python
    plan: free
    region: oregon
    repo: https://github.com/risojo/SupplyChain-Optimization
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run modules/inventarios/inventario_app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
