# Despliegue en Render (Blueprint / Infrastructure as Code).
#
# IMPORTANTE: el código en GitHub NO crea la URL solo. Debe crear el servicio
# en https://dashboard.render.com (ver docs/DEPLOY_RENDER.md).
#
# URLs (después de crear los servicios):
#   Perfilado:  https://lri-supply-chain-optimization.onrender.com
#   Inventarios: https://lri-inventarios.onrender.com
services:
  - type: web
    name: lri-supply-chain-optimization
    runtime: python
    plan: free
    repo: https://github.com/risojo/SupplyChain-Optimization
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run modules/perfilado/profile1.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
  - type: web
    name: lri-inventarios
    runtime: python
    plan: free
    repo: https://github.com/risojo/SupplyChain-Optimization
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run modules/inventarios/inventario_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
