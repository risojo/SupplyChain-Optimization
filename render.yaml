# LRI Supply Chain Optimization — Render Blueprint (repo / carpeta raíz del proyecto)
# Cada servicio = un módulo operativo con su propia URL:
#   Perfilado   → lri-analytics-pro   → modules/perfilado/profile1.py
#   Inventarios → lri-inventarios     → modules/inventarios/inventario_app.py
#
# Crear servicios: https://dashboard.render.com/blueprint/new?repo=https://github.com/risojo/SupplyChain-Optimization
services:
  - type: web
    name: lri-analytics-pro
    runtime: python
    plan: free
    region: oregon
    repo: https://github.com/risojo/SupplyChain-Optimization
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run modules/perfilado/profile1.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
  - type: web
    name: lri-inventarios
    runtime: python
    plan: free
    region: oregon
    repo: https://github.com/risojo/SupplyChain-Optimization
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run modules/inventarios/inventario_app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
