# Despliegue en Render (Blueprint / Infrastructure as Code).
#
# IMPORTANTE: subir render.yaml a GitHub NO crea servicios solos.
# Debe sincronizar el Blueprint en https://dashboard.render.com
# (ver docs/DEPLOY_RENDER.md).
#
# Servicios:
#   - lri-supply-chain-optimization → Perfilado (profile1.py)
#   - lri-inventarios               → Inventarios (inventario_app.py)
services:
  - type: web
    name: lri-supply-chain-optimization
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run modules/perfilado/profile1.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
  - type: web
    name: lri-inventarios
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run modules/inventarios/inventario_app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
